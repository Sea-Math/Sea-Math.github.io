<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Proxy Loader</title>
  <style>
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; 
      background-color: #060c12; color: #7dd3fc; 
      font-family: monospace; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    #canvas-container {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: none; /* Hidden until ready */
    }

    #canvas-container iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(125,211,252,0.15);
      border-top-color: #7dd3fc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    #status-box { text-align: center; }
  </style>
</head>
<body>

  <div id="status-box">
    <div class="spinner" style="margin: 0 auto 15px auto;"></div>
    <div id="status-text">Booting proxy engine...</div>
  </div>

  <div id="canvas-container"></div>

  <script type="module">
    // Dynamically importing exactly how your seabeansearch.html does it
    async function boot() {
      const statusText = document.getElementById('status-text');
      
      try {
        statusText.innerText = "Loading modules...";
        const canvasModule = await import('./shader-canvas.js');
        const ShaderCanvas = canvasModule.ShaderCanvas;

        statusText.innerText = "Initializing engine...";
        const canvas = new ShaderCanvas('canvas-container');

        // 🔴 CHANGE THIS TO YOUR URL 🔴
        const TARGET_URL = 'https://latte-x.neocities.org/chat'; 

        // WAIT FOR THE PROXY TO BE READY BEFORE NAVIGATING!
        canvas.on(ShaderCanvas.EVENTS.READY, () => {
          document.getElementById('status-box').style.display = 'none';
          document.getElementById('canvas-container').style.display = 'block';
          
          const surfaceId = canvas.createSurface();
          canvas.switchSurface(surfaceId);
          canvas.navigate(TARGET_URL);
        });

        // Catch any internal proxy errors
        canvas.on(ShaderCanvas.EVENTS.ERROR, (e) => {
          console.error('Shader error:', e);
          statusText.innerText = 'Proxy Error: ' + e.message;
          statusText.style.color = '#ff6b6b';
        });

      } catch (err) {
        console.error("Boot failed:", err);
        statusText.innerText = "Critical Error: " + err.message + "\n\n(Are you running this on a web server?)";
        statusText.style.color = '#ff6b6b';
      }
    }

    boot();
  </script>

</body>
</html>
