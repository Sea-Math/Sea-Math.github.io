<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarkStream - Audio Engine</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script type="module" src="shader-client.js"></script>
  <script type="module" src="shader-canvas.js"></script>

  <style>
    :root {
      --bg-deep: #050505; --bg-sidebar: #0a0a0a; --bg-panel: #111111;
      --bg-hover: #1a1a1a; --border-color: #222222;
      --text-main: #f0f0f0; --text-muted: #808080;
      --accent-blue: #007aff; --bg-blue-pill: #00274d;
      --accent-green: #2ecc71; --accent-red: #e74c3c;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; font-family: var(--font-family); background-color: var(--bg-deep); color: var(--text-main); overflow: hidden; }

    /* Layout */
    .app-layout { display: flex; height: calc(100vh - 90px); width: 100vw; }
    .sidebar { width: 260px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
    .main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow-y: auto; padding: 30px; }

    /* Typography & Sidebar */
    h1, h2, h3 { margin: 0; }
    .category-label { font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; margin: 24px 0 12px 0; letter-spacing: 1px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text-muted); font-weight: 500; transition: 0.2s; }
    .nav-item:hover, .nav-item.active { background: var(--bg-panel); color: var(--text-main); }
    
    /* Playlists */
    .playlist-item { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; }
    .playlist-item:hover { background: var(--bg-hover); }
    .playlist-cover { width: 32px; height: 32px; border-radius: 6px; background: #333; object-fit: cover; }
    .playlist-info { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .playlist-title { font-size: 14px; font-weight: 500; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .playlist-count { font-size: 11px; color: var(--text-muted); }

    /* Search Input */
    .search-container { display: flex; gap: 10px; margin-bottom: 30px; }
    .input-dark { flex: 1; background: var(--bg-panel); border: 1px solid var(--border-color); color: var(--text-main); padding: 14px 20px; border-radius: 12px; outline: none; font-size: 16px; transition: 0.2s; }
    .input-dark:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.2); }
    .btn-primary { background: var(--accent-blue); color: white; border: none; padding: 10px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-primary:hover { background: #005bb5; }

    /* Track Grid */
    .track-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .track-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; transition: 0.2s; cursor: pointer; position: relative; }
    .track-card:hover { transform: translateY(-4px); border-color: var(--accent-blue); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .track-art { width: 100%; aspect-ratio: 1; border-radius: 8px; background: #222; object-fit: cover; margin-bottom: 12px; }
    .track-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 12px; color: var(--text-muted); }
    
    .card-actions { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; opacity: 0; transition: 0.2s; }
    .track-card:hover .card-actions { opacity: 1; }
    .icon-btn { background: rgba(0,0,0,0.7); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; backdrop-filter: blur(4px); }
    .icon-btn:hover { background: var(--accent-blue); transform: scale(1.1); }

    /* Player Bar */
    .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 90px; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; z-index: 100; }
    
    .now-playing { display: flex; align-items: center; gap: 16px; width: 30%; }
    .np-art { width: 56px; height: 56px; border-radius: 8px; background: #222; object-fit: cover; }
    .np-info { display: flex; flex-direction: column; overflow: hidden; }
    .np-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-artist { font-size: 12px; color: var(--text-muted); }

    .player-controls { display: flex; flex-direction: column; align-items: center; width: 40%; gap: 8px; }
    .buttons { display: flex; align-items: center; gap: 20px; }
    .ctrl-btn { background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; opacity: 0.7; }
    .ctrl-btn:hover { opacity: 1; }
    .ctrl-btn.active { opacity: 1; color: var(--accent-blue); }
    .play-btn { width: 40px; height: 40px; background: white; color: black; border-radius: 50%; opacity: 1; display: flex; justify-content: center; align-items: center; }
    .play-btn:hover { transform: scale(1.05); background: var(--text-main); }

    .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-muted); }
    .progress-bar { flex: 1; height: 4px; background: var(--border-color); border-radius: 2px; cursor: pointer; position: relative; }
    .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--text-main); border-radius: 2px; width: 0%; pointer-events: none; }
    .progress-bar:hover .progress-fill { background: var(--accent-green); }

    .right-controls { width: 30%; display: flex; justify-content: flex-end; align-items: center; gap: 16px; }
    .lyrics-btn { padding: 6px 12px; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
    .lyrics-btn:hover, .lyrics-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }

    /* Apple Music Lyrics Overlay */
    #lyrics-overlay { position: fixed; inset: 0; z-index: 50; display: none; background-color: #000; overflow: hidden; }
    #lyrics-overlay.active { display: flex; }
    .lyrics-bg { position: absolute; inset: -50px; background-size: cover; background-position: center; filter: blur(60px) brightness(0.4); z-index: 1; transform: scale(1.2); }
    .lyrics-content { position: relative; z-index: 2; width: 100%; height: calc(100vh - 90px); overflow-y: auto; padding: 100px 20vw; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
    .lyric-line { font-size: 42px; font-weight: 800; color: rgba(255, 255, 255, 0.4); line-height: 1.3; transition: 0.3s color; cursor: pointer; }
    .lyric-line:hover { color: rgba(255, 255, 255, 0.8); }
    .lyric-line.highlight { color: #fff; transform: scale(1.02); text-shadow: 0 4px 20px rgba(0,0,0,0.5); }

    /* Modals */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 200; display: none; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-box { background: var(--bg-sidebar); border: 1px solid var(--border-color); padding: 24px; border-radius: 16px; width: 400px; display: flex; flex-direction: column; gap: 16px; max-height: 80vh; overflow-y: auto; }
  </style>
</head>
<body>

  <div class="app-layout">
    <nav class="sidebar">
      <h2 style="margin-bottom: 24px; font-size: 20px;">DarkStream</h2>
      
      <div class="nav-item active" onclick="showView('search')">
        <i data-lucide="search" size="18"></i> Search
      </div>
      <div class="nav-item" onclick="showView('queue')">
        <i data-lucide="list-video" size="18"></i> Play Queue
      </div>

      <div class="category-label" style="display: flex; justify-content: space-between; align-items: center;">
        Your Playlists
        <i data-lucide="plus" size="14" style="cursor: pointer; color: var(--text-main);" onclick="openPlaylistModal()"></i>
      </div>
      
      <div id="playlists-container"></div>
    </nav>

    <main class="main-content" id="main-view">
      <div id="view-search">
        <div class="search-container">
          <input type="text" id="search-input" class="input-dark" placeholder="Search through Sea Bean proxy...">
          <button class="btn-primary" onclick="executeSearch()">Search</button>
        </div>
        <div id="loading-indicator" style="display: none; color: var(--text-muted); margin-bottom: 20px;">Fetching...</div>
        <div class="track-grid" id="results-grid"></div>
      </div>

      <div id="view-queue" style="display: none;">
        <h2 style="margin-bottom: 20px;">Up Next</h2>
        <div id="queue-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </div>
    </main>
  </div>

  <div class="player-bar">
    <div class="now-playing">
      <img src="https://via.placeholder.com/56x56/222222/222222" id="np-art" class="np-art">
      <div class="np-info">
        <span class="np-title" id="np-title">No track selected</span>
        <span class="np-artist" id="np-artist">---</span>
      </div>
    </div>

    <div class="player-controls">
      <div class="buttons">
        <button class="ctrl-btn" id="btn-shuffle" onclick="toggleShuffle()"><i data-lucide="shuffle" size="18"></i></button>
        <button class="ctrl-btn" onclick="prevTrack()"><i data-lucide="skip-back" size="20"></i></button>
        <button class="ctrl-btn play-btn" onclick="togglePlay()"><i data-lucide="play" size="20" id="play-icon" style="fill: black;"></i></button>
        <button class="ctrl-btn" onclick="nextTrack()"><i data-lucide="skip-forward" size="20"></i></button>
        <button class="ctrl-btn" id="btn-repeat" onclick="toggleRepeat()"><i data-lucide="repeat" size="18" id="repeat-icon"></i></button>
      </div>
      <div class="progress-container">
        <span id="time-current">0:00</span>
        <div class="progress-bar" id="progress-bar" onclick="seekTrack(event)">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div class="right-controls">
      <button class="lyrics-btn" id="lyrics-toggle" onclick="toggleLyrics()">Lyrics</button>
      <i data-lucide="volume-2" size="18" style="color: var(--text-muted);"></i>
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" style="width: 80px; accent-color: var(--text-main);">
    </div>
  </div>

  <div id="lyrics-overlay">
    <div class="lyrics-bg" id="lyrics-bg"></div>
    <div class="lyrics-content" id="lyrics-content">
      <div style="text-align: center; margin-top: 20vh; color: rgba(255,255,255,0.5);">Play a song to see lyrics</div>
    </div>
  </div>

  <div class="modal" id="playlist-modal">
    <div class="modal-box">
      <h3 style="margin: 0;">Create Playlist</h3>
      <input type="text" id="new-pl-name" class="input-dark" placeholder="Playlist Name">
      <label style="font-size: 12px; color: var(--text-muted);">Cover Image (Optional):</label>
      <input type="file" id="new-pl-image" class="input-dark" accept="image/*" style="padding: 8px;">
      <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
        <button class="btn-primary" style="background: var(--bg-panel); color: white;" onclick="closePlaylistModal()">Cancel</button>
        <button class="btn-primary" onclick="savePlaylist()">Create</button>
      </div>
    </div>
  </div>

  <div class="modal" id="add-to-pl-modal">
    <div class="modal-box">
      <h3 style="margin: 0;">Add to Playlist</h3>
      <div id="save-pl-list" style="display: flex; flex-direction: column; gap: 8px; margin-top: 10px;"></div>
      <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
        <button class="btn-primary" style="background: var(--bg-panel); color: white;" onclick="closeAddToPlModal()">Cancel</button>
      </div>
    </div>
  </div>

  <audio id="audio-engine"></audio>

  <script>
    try { lucide.createIcons(); } catch(e) {}

    // --- SEA BEAN PROXY ROUTING ---
    // If your Sea Bean proxy requires a URL prefix (like `/service/`), set it here.
    // Otherwise, keep it empty if the Service Worker auto-intercepts.
    const PROXY_PREFIX = ""; 
    
    const API_SEARCH = PROXY_PREFIX + "https://host.optikl.ink/soundcloud/search?query=";
    const API_STREAM = PROXY_PREFIX + "https://host.optikl.ink/soundcloud/download?url=";
    
    let queue = [];
    let currentIndex = -1;
    let playlists = [];
    let isShuffle = false;
    let repeatMode = 0; 
    let trackPendingSave = null; 

    try {
      const saved = localStorage.getItem('darkstream_playlists');
      if (saved) playlists = JSON.parse(saved);
    } catch (e) {}
    
    const audio = document.getElementById('audio-engine');
    const playIcon = document.getElementById('play-icon');
    const progressFill = document.getElementById('progress-fill');
    
    function showView(viewId) {
      document.getElementById('view-search').style.display = viewId === 'search' ? 'block' : 'none';
      document.getElementById('view-queue').style.display = viewId === 'queue' ? 'block' : 'none';
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');
      if(viewId === 'queue') renderQueue();
    }

    async function executeSearch() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) return;
      
      const loadingEl = document.getElementById('loading-indicator');
      const gridEl = document.getElementById('results-grid');
      
      loadingEl.style.display = 'block';
      loadingEl.innerHTML = 'Fetching via Sea Bean proxy...';
      gridEl.innerHTML = '';

      try {
        const res = await fetch(API_SEARCH + encodeURIComponent(query));
        if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
        
        const data = await res.json();
        loadingEl.style.display = 'none';
        
        const tracks = Array.isArray(data) ? data : [];
        if (tracks.length === 0) {
          loadingEl.style.display = 'block';
          loadingEl.innerHTML = 'No results found.';
          return;
        }

        tracks.forEach(track => {
          if(!track.url && !track.permalink_url) return;
          
          const title = track.title || 'Unknown Track';
          const artist = track.author?.name || track.user?.username || 'Unknown Artist';
          const originalUrl = track.url || track.permalink_url;
          const artUrl = track.thumbnail ? track.thumbnail.replace('large', 't500x500') : 
                         (track.artwork_url ? track.artwork_url.replace('large', 't500x500') : 'https://via.placeholder.com/500x500/111111/444444');

          const trackObject = { title, artist, artUrl, streamTarget: originalUrl };
          const encodedTrack = encodeURIComponent(JSON.stringify(trackObject));

          const card = document.createElement('div');
          card.className = 'track-card';
          card.innerHTML = `
            <img src="${artUrl}" class="track-art">
            <div class="track-title">${title}</div>
            <div class="track-artist">${artist}</div>
            <div class="card-actions">
              <button class="icon-btn" title="Save to Playlist" onclick="event.stopPropagation(); openAddToPlModal('${encodedTrack}')">
                <i data-lucide="folder-plus" size="16"></i>
              </button>
              <button class="icon-btn" title="Add to Queue" onclick="event.stopPropagation(); addToQueue('${encodedTrack}', this)">
                <i data-lucide="list-plus" size="16"></i>
              </button>
            </div>
          `;
          card.onclick = () => playDirect(trackObject);
          gridEl.appendChild(card);
        });
        lucide.createIcons();
      } catch (err) {
        loadingEl.innerHTML = `<span style="color: var(--accent-red);">Proxy Fetch Error: ${err.message}</span>`;
      }
    }

    document.getElementById('search-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') executeSearch(); });

    function playDirect(track) {
      queue = [track];
      currentIndex = 0;
      loadTrack(track);
      renderQueue();
    }

    function addToQueue(trackStr, btnElement) {
      try {
        const track = JSON.parse(decodeURIComponent(trackStr));
        queue.push(track);
        if (queue.length === 1 && audio.paused && !audio.src) {
          currentIndex = 0;
          loadTrack(track);
        }
        btnElement.innerHTML = `<i data-lucide="check" size="16" style="color:var(--accent-green)"></i>`;
        lucide.createIcons();
        setTimeout(() => { btnElement.innerHTML = `<i data-lucide="list-plus" size="16"></i>`; lucide.createIcons(); }, 1500);
        renderQueue();
      } catch(e) {}
    }

    async function loadTrack(track) {
      if (!track) return;
      document.getElementById('np-art').src = track.artUrl || '';
      document.getElementById('np-title').innerText = track.title || 'Loading...';
      document.getElementById('np-artist').innerText = track.artist || 'Unknown';
      document.getElementById('lyrics-bg').style.backgroundImage = `url(${track.artUrl || ''})`;
      
      try {
        const res = await fetch(API_STREAM + encodeURIComponent(track.streamTarget));
        if (!res.ok) throw new Error("Proxy stream fetch failed");
        
        const streamData = await res.json();
        if (streamData && streamData.audio_url) {
          // Route the actual audio source through the proxy as well if needed
          audio.src = PROXY_PREFIX + streamData.audio_url;
          audio.play().catch(e => console.warn("Autoplay blocked"));
        } else {
          throw new Error("No audio_url");
        }
      } catch (err) {
        document.getElementById('np-title').innerText = "⚠️ Proxy Stream Error";
      }
      
      renderQueue();
      fetchLyrics(track.artist, track.title);
    }

    function togglePlay() {
      if (!audio.src) {
        if (queue.length > 0) loadTrack(queue[0]);
        return;
      }
      if (audio.paused) { audio.play(); } 
      else { audio.pause(); }
    }

    audio.addEventListener('play', () => { playIcon.setAttribute('data-lucide', 'pause'); lucide.createIcons(); });
    audio.addEventListener('pause', () => { playIcon.setAttribute('data-lucide', 'play'); lucide.createIcons(); });

    function toggleShuffle() {
      isShuffle = !isShuffle;
      const btn = document.getElementById('btn-shuffle');
      if (isShuffle) { btn.classList.add('active'); } else { btn.classList.remove('active'); }
    }

    function toggleRepeat() {
      repeatMode = (repeatMode + 1) % 3;
      const btn = document.getElementById('btn-repeat');
      const icon = document.getElementById('repeat-icon');
      
      if (repeatMode === 0) { btn.classList.remove('active'); icon.setAttribute('data-lucide', 'repeat'); } 
      else if (repeatMode === 1) { btn.classList.add('active'); icon.setAttribute('data-lucide', 'repeat'); } 
      else { btn.classList.add('active'); icon.setAttribute('data-lucide', 'repeat-1'); }
      lucide.createIcons();
    }

    function nextTrack() {
      if (queue.length === 0) return;
      if (repeatMode === 2) { audio.currentTime = 0; audio.play(); return; }

      if (isShuffle) {
        let nextIdx = Math.floor(Math.random() * queue.length);
        if (nextIdx === currentIndex && queue.length > 1) { nextIdx = (nextIdx + 1) % queue.length; }
        currentIndex = nextIdx;
      } else {
        currentIndex++;
        if (currentIndex >= queue.length) {
          if (repeatMode === 1) { currentIndex = 0; } else { currentIndex = queue.length - 1; return; } 
        }
      }
      loadTrack(queue[currentIndex]);
    }

    function prevTrack() {
      if (audio.currentTime > 3) { audio.currentTime = 0; return; }
      if (currentIndex > 0) { currentIndex--; loadTrack(queue[currentIndex]); }
    }

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      progressFill.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
      document.getElementById('time-current').innerText = formatTime(audio.currentTime);
      document.getElementById('time-total').innerText = formatTime(audio.duration);
    });

    audio.addEventListener('ended', nextTrack);
    document.getElementById('volume-slider').addEventListener('input', (e) => { audio.volume = e.target.value; });

    function seekTrack(e) {
      if (!audio.duration) return;
      const rect = e.currentTarget.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function renderQueue() {
      const container = document.getElementById('queue-list');
      if (!container) return;
      container.innerHTML = '';
      if (queue.length === 0) {
        container.innerHTML = '<div style="color: var(--text-muted);">Your queue is empty.</div>';
        return;
      }
      queue.forEach((track, idx) => {
        const div = document.createElement('div');
        div.className = 'playlist-item';
        div.style.background = idx === currentIndex ? 'var(--bg-panel)' : 'transparent';
        div.innerHTML = `
          <img src="${track.artUrl}" style="width: 40px; height: 40px; border-radius: 4px; background: #222;">
          <div style="flex:1; overflow: hidden;">
            <div style="font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: ${idx === currentIndex ? 'var(--accent-blue)' : 'white'}">${track.title}</div>
            <div style="font-size: 12px; color: var(--text-muted)">${track.artist}</div>
          </div>
          ${idx === currentIndex ? '<i data-lucide="bar-chart-2" size="16" style="color: var(--accent-blue)"></i>' : `
             <button class="icon-btn" style="width: 28px; height: 28px; background: transparent;" onclick="event.stopPropagation(); queue.splice(${idx}, 1); renderQueue();"><i data-lucide="x" size="14"></i></button>
          `}
        `;
        div.onclick = () => { currentIndex = idx; loadTrack(track); };
        container.appendChild(div);
      });
      lucide.createIcons();
    }

    // --- Lyrics Engine ---
    let lyricsVisible = false;
    function toggleLyrics() {
      lyricsVisible = !lyricsVisible;
      document.getElementById('lyrics-overlay').classList.toggle('active', lyricsVisible);
      document.getElementById('lyrics-toggle').classList.toggle('active', lyricsVisible);
    }

    async function fetchLyrics(artist, title) {
      const container = document.getElementById('lyrics-content');
      container.innerHTML = `<div style="text-align:center; margin-top:20vh; font-size: 24px;">Looking for lyrics...</div>`;
      if (!artist || !title) return;
      
      try {
        let cleanTitle = title.split('(')[0].split('[')[0].split('ft.')[0].split('feat')[0].trim();
        let cleanArtist = artist.split('-')[0].trim();
        
        // Let lyrics route through proxy too if necessary
        const res = await fetch(PROXY_PREFIX + `https://lyrist.vercel.app/api/${encodeURIComponent(cleanTitle)}/${encodeURIComponent(cleanArtist)}`);
        const data = await res.json();
        
        if (data && data.lyrics) {
          container.innerHTML = '';
          data.lyrics.split('\n').forEach(line => {
            if (!line.trim()) return; 
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.innerText = line;
            div.onclick = () => {
              document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('highlight'));
              div.classList.add('highlight');
              div.scrollIntoView({ behavior: 'smooth', block: 'center' });
            };
            container.appendChild(div);
          });
        } else {
          container.innerHTML = `<div style="text-align:center; margin-top:20vh; font-size: 24px; color: var(--text-muted);">Instrumental or Lyrics not found.</div>`;
        }
      } catch (e) {
        container.innerHTML = `<div style="text-align:center; margin-top:20vh; font-size: 24px; color: var(--text-muted);">Could not fetch lyrics.</div>`;
      }
    }

    // --- Playlists Management ---
    function renderPlaylists() {
      const container = document.getElementById('playlists-container');
      container.innerHTML = '';
      playlists.forEach((pl) => {
        const div = document.createElement('div');
        div.className = 'playlist-item';
        div.innerHTML = `
          <img src="${pl.cover || 'https://via.placeholder.com/32x32/222222/444444'}" class="playlist-cover">
          <div class="playlist-info">
            <span class="playlist-title">${pl.name}</span>
            <span class="playlist-count">${pl.tracks ? pl.tracks.length : 0} tracks</span>
          </div>
          <i data-lucide="play-circle" size="18" style="color: var(--text-muted); opacity: 0;" class="pl-play-icon"></i>
        `;
        div.onmouseenter = () => div.querySelector('.pl-play-icon').style.opacity = '1';
        div.onmouseleave = () => div.querySelector('.pl-play-icon').style.opacity = '0';
        
        div.onclick = () => {
          if(pl.tracks && pl.tracks.length > 0) {
            queue = [...pl.tracks]; currentIndex = 0; loadTrack(queue[0]); showView('queue');
          } else { alert("Playlist is empty."); }
        };
        container.appendChild(div);
      });
      lucide.createIcons();
    }

    function openPlaylistModal() { document.getElementById('playlist-modal').classList.add('active'); }
    function closePlaylistModal() { document.getElementById('playlist-modal').classList.remove('active'); }

    function savePlaylist() {
      const name = document.getElementById('new-pl-name').value.trim();
      const fileInput = document.getElementById('new-pl-image');
      if (!name) return alert("Playlist needs a name");

      const finishSave = (base64Cover) => {
        playlists.push({ id: Date.now(), name: name, cover: base64Cover, tracks: [] });
        try { localStorage.setItem('darkstream_playlists', JSON.stringify(playlists)); } catch(e) {}
        renderPlaylists(); closePlaylistModal();
        document.getElementById('new-pl-name').value = ''; fileInput.value = '';
      };

      if (fileInput.files && fileInput.files.length > 0) {
        const reader = new FileReader();
        reader.onload = (e) => finishSave(e.target.result);
        reader.readAsDataURL(fileInput.files[0]);
      } else { finishSave(null); }
    }

    function openAddToPlModal(trackStr) {
      trackPendingSave = JSON.parse(decodeURIComponent(trackStr));
      const listContainer = document.getElementById('save-pl-list');
      listContainer.innerHTML = '';
      
      if (playlists.length === 0) {
        listContainer.innerHTML = '<div style="color:var(--text-muted); font-size: 14px;">No playlists created yet. Create one on the left sidebar!</div>';
      } else {
        playlists.forEach((pl, index) => {
          const btn = document.createElement('button');
          btn.className = 'btn-primary';
          btn.style.background = 'var(--bg-hover)';
          btn.style.color = 'var(--text-main)';
          btn.style.textAlign = 'left';
          btn.innerText = pl.name;
          btn.onclick = () => confirmAddToPlaylist(index);
          listContainer.appendChild(btn);
        });
      }
      document.getElementById('add-to-pl-modal').classList.add('active');
    }

    function closeAddToPlModal() {
      trackPendingSave = null;
      document.getElementById('add-to-pl-modal').classList.remove('active');
    }

    function confirmAddToPlaylist(plIndex) {
      if (!trackPendingSave) return;
      if (!playlists[plIndex].tracks) playlists[plIndex].tracks = [];
      const exists = playlists[plIndex].tracks.find(t => t.streamTarget === trackPendingSave.streamTarget);
      if (!exists) {
        playlists[plIndex].tracks.push(trackPendingSave);
        try { localStorage.setItem('darkstream_playlists', JSON.stringify(playlists)); } catch(e) {}
        renderPlaylists();
      }
      closeAddToPlModal();
    }

    renderPlaylists();
  </script>
</body>
</html>
