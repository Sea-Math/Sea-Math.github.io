<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sea Bean</title>
    <link rel="icon" type="image/jpeg" href="mathpunch.jpeg" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Product+Sans:wght@400&display=swap" rel="stylesheet" />
    
    <script src="/sail/baremux/index.js"></script>
    <script src="/sail/scram/scramjet.all.js"></script>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>

    <script src="https://unpkg.com/alpinejs" defer></script>
    
    <style>
      /* Light Theme */
      :root {
        --bg-primary: #ffffff; --bg-secondary: #f1f3f4; --bg-tertiary: #e8eaed;
        --bg-tab-strip: #dee1e6; --accent: #1a73e8; --text-primary: #202124;
        --text-secondary: #5f6368; --border: #dadce0; --shadow: rgba(32, 33, 36, 0.28);
        --panel-bg: #ffffff;
      }
      /* Dark Theme */
      :root[data-theme="dark"] {
        --bg-primary: #323639; --bg-secondary: #202124; --bg-tertiary: #202124;
        --bg-tab-strip: #202124; --accent: #8ab4f8; --text-primary: #e8eaed;
        --text-secondary: #9aa0a6; --border: #5f6368; --shadow: rgba(0, 0, 0, 0.5);
        --panel-bg: #292a2d;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; margin: 0; overflow: hidden; }

      body {
        font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        background: var(--bg-primary); color: var(--text-primary);
        display: flex; flex-direction: column; transition: background-color 0.2s, color 0.2s;
      }

      /* Loading */
      .loading-overlay { position: fixed; inset: 0; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 2000; }
      .spinner { width: 24px; height: 24px; border: 3px solid var(--bg-tertiary); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Top Bar & Tabs */
      .top-bar { background: var(--bg-tab-strip); display: flex; flex-direction: column; padding-top: 6px; z-index: 100; position: relative; flex-shrink: 0; }
      .tabs-wrapper { display: flex; align-items: flex-end; width: 100%; padding-left: 8px; }
      .search-tabs-btn { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-primary); cursor: pointer; margin-right: 8px; margin-bottom: 4px; transition: background 0.1s; }
      .search-tabs-btn:hover { background: var(--bg-tertiary); }
      .tabs-container { display: flex; align-items: flex-end; gap: 0px; height: 34px; overflow-x: auto; flex: 1; }
      .tabs-container::-webkit-scrollbar { display: none; }
      .tab { background: transparent; padding: 0 8px 0 10px; border-radius: 10px 10px 0 0; font-size: 12px; cursor: default; display: flex; align-items: center; gap: 8px; min-width: 160px; max-width: 240px; height: 34px; color: var(--text-secondary); position: relative; flex-shrink: 1; transition: background 0.1s; }
      .tab:hover:not(.active) { background: var(--bg-tertiary); }
      .tab.active { background: var(--bg-primary); color: var(--text-primary); z-index: 2; }
      .tab.active::before, .tab.active::after { content: ''; position: absolute; bottom: 0; width: 12px; height: 12px; background: var(--bg-primary); pointer-events: none; }
      .tab.active::before { left: -12px; -webkit-mask-image: radial-gradient(circle at 0 0, transparent 12px, black 0); }
      .tab.active::after { right: -12px; -webkit-mask-image: radial-gradient(circle at 12px 0, transparent 12px, black 0); }
      .tab-divider { position: absolute; right: 0; top: 25%; height: 50%; width: 1px; background: var(--border); transition: opacity 0.2s; }
      .tab.active .tab-divider, .tab:hover .tab-divider, .tab.active + .tab .tab-divider { opacity: 0; }
      .tab:last-of-type .tab-divider { display: none; }
      .tab-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; user-select: none; }
      .close-tab { color: var(--text-secondary); font-size: 16px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.1s, opacity 0.1s; cursor: pointer; user-select: none; opacity: 0; pointer-events: none; }
      .tab:hover .close-tab, .tab.active .close-tab { opacity: 1; pointer-events: auto; }
      .close-tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }
      .new-tab-btn { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary); font-size: 20px; font-weight: 300; margin-left: 6px; margin-bottom: 3px; transition: background 0.1s; z-index: 1; }
      .new-tab-btn:hover { background: var(--bg-tertiary); }

      /* Toolbar */
      .toolbar { background: var(--bg-primary); padding: 4px 8px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--border); position: relative; z-index: 10; }
      .nav-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.1s; flex-shrink: 0; }
      .nav-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
      .nav-btn svg { width: 18px; height: 18px; fill: currentColor; }
      .url-bar { flex: 1; position: relative; height: 34px; margin: 0 4px; }
      .omnibox-wrapper { position: absolute; top: 0; left: 0; right: 0; background: var(--bg-secondary); border-radius: 17px; display: flex; flex-direction: column; z-index: 1000; border: 1px solid transparent; }
      .omnibox-wrapper.focused { background: var(--bg-primary); box-shadow: 0 4px 6px var(--shadow); }
      .omnibox-wrapper.has-suggestions { border-radius: 16px; padding-bottom: 8px; }
      .url-bar-container { display: flex; align-items: center; padding: 0 14px; height: 34px; }
      .omnibox-wrapper.has-suggestions .url-bar-container { border-bottom: 1px solid var(--border); }
      .url-bar-container input { width: 100%; border: none; background: transparent; color: var(--text-primary); font-family: 'Roboto', sans-serif; font-size: 14px; outline: none; padding: 0 8px; }

      /* Bookmarks & Popups */
      .bookmark-bar { background: var(--bg-primary); display: flex; align-items: center; padding: 4px 8px; border-bottom: 1px solid var(--border); overflow-x: auto; gap: 4px; height: 34px; flex-shrink: 0; }
      .bookmark-bar::-webkit-scrollbar { display: none; }
      .bookmark-item { display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 16px; cursor: pointer; font-size: 12px; color: var(--text-primary); transition: background 0.1s; }
      .bookmark-item:hover { background: var(--bg-secondary); }
      .bookmark-item img { width: 16px; height: 16px; border-radius: 2px; flex-shrink: 0; }
      .suggestions-dropdown { display: flex; flex-direction: column; background: transparent; padding-top: 4px; }
      .suggestion-item { padding: 6px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; color: var(--text-primary); }
      .suggestion-item:hover, .suggestion-item.selected { background: var(--bg-secondary); }
      .popup-menu { position: absolute; background: var(--panel-bg); border: 1px solid var(--border); box-shadow: 0 4px 12px var(--shadow); border-radius: 8px; padding: 8px 0; z-index: 2000; min-width: 250px; display: flex; flex-direction: column; }
      .popup-item { padding: 10px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 13px; color: var(--text-primary); }
      .popup-item:hover { background: var(--bg-secondary); }
      .popup-header { padding: 8px 16px; font-weight: 500; font-size: 14px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

      /* Chrome Icons */
      .chrome-actions { display: flex; align-items: center; gap: 2px; margin-left: 8px; padding-left: 8px; position: relative; flex-shrink: 0;}
      .profile-icon { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; cursor: pointer; margin-left: 8px; }
      .zoom-level { font-size: 12px; color: var(--text-secondary); min-width: 42px; text-align: center; font-weight: 500; user-select: none; cursor: pointer; margin: 0 2px; }
      .zoom-level:hover { background: var(--bg-secondary); border-radius: 12px; padding: 4px 0; color: var(--text-primary); }

      /* Content Area */
      .content-area { flex: 1; background: var(--bg-primary); position: relative; display: flex; overflow: hidden; }
      
      /* SHADER CONTAINER */
      #canvas-container { width: 100%; height: 100%; position: relative; }
      /* NATIVE IFRAME CONTAINER */
      #native-iframe-container { width: 100%; height: 100%; position: relative; }
      .proxy-iframe { display: block; width: 100%; height: 100%; border: none; zoom: var(--iframe-zoom, 1); }

      /* Home */
      .empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 10vh; background-color: var(--bg-primary); overflow-y: auto; z-index: 10; }
      .bg-image-layer { position: absolute; inset: -20px; background-size: cover; background-position: center; filter: blur(6px); z-index: -2; pointer-events: none; }
      .bg-overlay-layer { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.3); z-index: -1; pointer-events: none; }
      .main-logo { font-family: 'Product Sans', 'Roboto', sans-serif; font-size: 5.5rem; font-weight: 400; letter-spacing: -2px; margin-bottom: 30px; user-select: none; z-index: 1; }
      .search-container { width: 100%; max-width: 580px; position: relative; padding: 0 20px; margin-bottom: 30px; z-index: 2; }
      .home-omnibox-wrapper { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 24px; display: flex; flex-direction: column; position: relative; z-index: 1000; }
      .home-omnibox-wrapper:hover, .home-omnibox-wrapper.focused { box-shadow: 0 1px 6px var(--shadow); border-color: transparent; }
      .home-search-box { display: flex; align-items: center; width: 100%; padding: 0 14px 0 18px; height: 46px; }
      .home-search-box input { flex: 1; border: none; background: transparent; font-size: 16px; outline: none; padding: 0 8px; color: var(--text-primary); }
      .quick-apps-grid { display: grid; grid-template-columns: repeat(5, 112px); gap: 16px 8px; justify-items: center; justify-content: center; max-width: 600px; z-index: 1; }
      .app-card { border-radius: 8px; padding: 16px 8px 8px; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; width: 112px; position: relative; }
      .app-card:hover { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(4px); }
      .app-icon { width: 48px; height: 48px; background: var(--bg-secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 12px; }
      .app-card:hover .app-icon { background: var(--bg-primary); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
      .app-icon img { width: 100%; height: 100%; object-fit: contain; }
      .app-name { font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 88px; }

      .customize-btn { position: absolute; bottom: 16px; right: 16px; display: flex; align-items: center; gap: 8px; background: var(--bg-primary); color: var(--text-secondary); padding: 6px 12px; border-radius: 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; user-select: none; border: 1px solid var(--border); box-shadow: 0 1px 3px var(--shadow); z-index: 2; }
      .side-panel { position: absolute; right: 0; top: 0; bottom: 0; width: 340px; background: var(--panel-bg); box-shadow: -2px 0 10px var(--shadow); z-index: 3000; padding: 20px; display: flex; flex-direction: column; gap: 20px; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      .side-panel.open { transform: translateX(0); }
      .side-panel h2 { font-size: 16px; font-weight: 500; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
      .side-panel input[type="text"], .side-panel select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); outline:none; }
      .side-panel button.close-panel { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--text-primary); line-height: 1; }
      .engine-badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; background: var(--accent); color: white; text-transform: uppercase; margin-left: 10px; }
    </style>
  </head>
  <body x-data="mathApp()" @click="closeDropdowns()" :data-theme="isDarkMode ? 'dark' : 'light'">

    <div x-show="!ready" class="loading-overlay"><div class="spinner"></div></div>

    <div class="top-bar" x-show="ready" style="display: none">
      <div class="tabs-wrapper">
        <div class="search-tabs-btn" title="Search Tabs" @click.stop="toggleMenu('searchTabs')">
           <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
        </div>
        
        <div class="popup-menu" x-show="menus.searchTabs" style="top: 36px; left: 8px;" @click.stop>
            <div class="popup-header">Open Tabs</div>
            <template x-for="tab in tabs" :key="tab.id">
                <div class="popup-item" @click="activateTab(tab.id); menus.searchTabs = false">
                    <img :src="tab.favicon || 'mathpunch.jpeg'" style="width:16px;height:16px;" onerror="this.onerror=null;this.src='mathpunch.jpeg'" />
                    <span x-text="tab.title || 'New Tab'"></span>
                </div>
            </template>
        </div>

        <div class="tabs-container">
          <template x-for="tab in tabs" :key="tab.id">
            <div class="tab" :class="{ 'active': activeTabId === tab.id }" @mousedown.prevent="activateTab(tab.id)">
              <img :src="tab.favicon || 'mathpunch.jpeg'" style="width:16px;height:16px;border-radius:2px;" onerror="this.onerror=null;this.src='mathpunch.jpeg'" />
              <span class="tab-title" x-text="tab.title || 'New Tab'"></span>
              <span class="close-tab" @click.stop.prevent="closeTab(tab.id)">×</span>
              <div class="tab-divider"></div>
            </div>
          </template>
          <div class="new-tab-btn" @click="addTab()" title="New Tab">+</div>
        </div>
      </div>

      <div class="toolbar">
        <button class="nav-btn" @click="goBack()" title="Go back"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path></svg></button>
        <button class="nav-btn" @click="goForward()" title="Go forward"><svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"></path></svg></button>
        <button class="nav-btn" @click="reloadTab()" title="Reload"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.24 4.94 14.24 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"></path></svg></button>
        
        <div class="url-bar" @click.stop>
          <div class="omnibox-wrapper" :class="{ 'focused': urlBarFocused, 'has-suggestions': showUrlSuggestions && suggestions.length > 0 }">
            <div class="url-bar-container">
              <svg style="width:16px;height:16px;fill:var(--text-secondary);margin-right:2px" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path></svg>
              <form @submit.prevent="submitUrlForm()" style="flex:1; margin:0; display:flex;">
                <input type="text" x-model="currentUrlInput" @focus="urlBarFocused = true; $event.target.select()" @input.debounce.150ms="fetchSuggestions(currentUrlInput, 'url')" @keydown.down.prevent="navSuggestion(1, 'url')" @keydown.up.prevent="navSuggestion(-1, 'url')" />
              </form>
            </div>
            <div class="suggestions-dropdown" x-show="showUrlSuggestions && suggestions.length > 0" style="display: none;">
              <template x-for="(sug, index) in suggestions" :key="index">
                <div class="suggestion-item" :class="{'selected': sugIndex === index}" @mousedown="selectSuggestion(sug)"><span x-text="sug"></span></div>
              </template>
            </div>
          </div>
        </div>

        <div class="chrome-actions" x-show="!showNewTabUI">
          <span class="engine-badge" x-text="proxyEngine"></span>
          <button class="nav-btn" @click="zoomOut()" style="margin-left:8px;" title="Zoom Out (Ctrl -)"><svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg></button>
          <span class="zoom-level" @click="resetZoom()" title="Reset Zoom" x-text="Math.round(zoomLevel * 100) + '%'"></span>
          <button class="nav-btn" @click="zoomIn()" title="Zoom In (Ctrl +)"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
          
          <button class="nav-btn" style="margin-left: 4px;" title="Customize and control Sea Bean" @click.stop="toggleMenu('chromeMenu')">
             <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
          </button>

          <div class="popup-menu" x-show="menus.chromeMenu" style="top: 40px; right: 8px;" @click.stop>
              <div class="popup-item" @click="addTab(); menus.chromeMenu = false">New tab</div>
              <div class="popup-header" style="margin-top: 4px;">Appearance</div>
              <div class="popup-item" @click="isDarkMode = !isDarkMode; menus.chromeMenu = false">Toggle Dark Mode</div>
              <div class="popup-item" @click="menus.customize = true; menus.chromeMenu = false">Customize Engines & Page...</div>
          </div>
        </div>
      </div>
    </div>

    <div class="content-area" x-show="ready" style="display: none" :style="{'--iframe-zoom': zoomLevel}">
      
      <div id="canvas-container" x-show="proxyEngine === 'shader' && !showNewTabUI"></div>

      <div id="native-iframe-container" x-show="(proxyEngine === 'scramjet' || proxyEngine === 'uv') && !showNewTabUI">
          <template x-for="tab in tabs" :key="tab.id">
              <iframe :id="'iframe-' + tab.id"
                      x-show="activeTabId === tab.id"
                      class="proxy-iframe"
                      :src="tab.iframeSrc"
                      frameborder="0"></iframe>
          </template>
      </div>

      <div class="empty-state" x-show="showNewTabUI">
        <div class="bg-image-layer" x-show="customBgUrl" :style="customBgUrl ? `background-image: url('${customBgUrl}')` : ''"></div>
        <div class="bg-overlay-layer" x-show="customBgUrl"></div>
        <div class="main-logo" :style="customBgUrl ? 'color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.8);' : ''">
          <span style="color:#4285f4">S</span><span style="color:#ea4335">e</span><span style="color:#fbbc05">a</span> 
          <span style="color:#4285f4">B</span><span style="color:#34a853">e</span><span style="color:#ea4335">a</span><span style="color:#4285f4">n</span>
        </div>

        <div class="search-container" @click.stop>
          <div class="home-omnibox-wrapper" :class="{'focused': homeFocused, 'has-suggestions': showHomeSuggestions && suggestions.length > 0}">
            <div class="home-search-box">
              <svg style="width:20px;height:20px;fill:var(--text-secondary);" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
              <form @submit.prevent="submitHomeForm()" style="flex:1; margin:0; display:flex;">
                <input type="text" x-model="homeSearchInput" placeholder="Search the web or type a URL" @focus="homeFocused = true" @input.debounce.150ms="fetchSuggestions(homeSearchInput, 'home')" />
              </form>
            </div>
          </div>
        </div>

        <div class="customize-btn" @click.stop="menus.customize = true" :style="customBgUrl ? 'background: rgba(255,255,255,0.2); color: white; border-color: transparent;' : ''">
          <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; fill: currentColor;"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          Settings & Engines
        </div>
      </div>
      
      <div class="side-panel" :class="{'open': menus.customize}" @click.stop>
          <h2>Settings <button class="close-panel" @click="menus.customize = false">×</button></h2>
          
          <div style="background: var(--bg-secondary); padding: 16px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px;">
              <p style="font-size: 14px; font-weight: 500; margin-bottom: 8px;">Proxy Engine Isolation</p>
              <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">Changing this turns off the others and reloads Sea Bean.</p>
              
              <select x-model="proxyEngine" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); outline:none; margin-bottom: 12px;">
                  <option value="uv">Ultraviolet (Recommended)</option>
                  <option value="scramjet">Scramjet</option>
                  <option value="shader">Shader-Canvas (Legacy)</option>
              </select>

              <div x-show="proxyEngine === 'scramjet' || proxyEngine === 'uv'">
                  <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">BareMux Wisp Server</p>
                  <select x-model="wispServer" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); outline:none;">
                      <option value="wss://wedvbmath.help/wisp/">Terbium Wisp (Default)</option>
                      <option value="wss://wisp.rhw.one/">Splash</option>
                      <option value="wss://portable.splash.best/wisp/">Portable Splash Wisp</option>
                  </select>
              </div>
          </div>

          <div style="background: var(--bg-secondary); padding: 16px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px;">
              <p style="font-size: 14px; font-weight: 500; margin-bottom: 8px;">Background</p>
              <input type="file" accept="image/*" @change="handleFileUpload" style="width: 100%; margin-bottom: 10px;">
              <input type="text" x-model="customBgUrl" placeholder="Or Paste image URL here...">
          </div>
      </div>
    </div>

    <script>
      function mathApp() {
        return {
          ready: false,
          tabs: [],
          activeTabId: null,
          currentUrlInput: '',
          homeSearchInput: '',
          
          urlBarFocused: false, homeFocused: false, suggestions: [], sugIndex: -1,
          showUrlSuggestions: false, showHomeSuggestions: false, zoomLevel: 1.0,
          
          isDarkMode: localStorage.getItem('sb_darkmode') === 'true',
          customBgUrl: localStorage.getItem('sb_bg') || '',
          
          // CORE ENGINE STATE
          proxyEngine: localStorage.getItem('sb_proxy') || 'uv',
          wispServer: localStorage.getItem('sb_wisp') || 'wss://wedvbmath.help/wisp/',

          menus: { searchTabs: false, chromeMenu: false, customize: false },

          get activeTab() { return this.tabs.find((t) => t.id === this.activeTabId) },
          get showNewTabUI() { return !this.activeTab || !this.activeTab.url || this.activeTab.url === 'about:blank' },

          async clearOtherSWs(keepPath) {
              if (!("serviceWorker" in navigator)) return;
              try {
                  const regs = await navigator.serviceWorker.getRegistrations();
                  for (let r of regs) {
                      if (!r.scope.includes(keepPath)) await r.unregister();
                  }
              } catch (e) { console.warn("Failed to clear SWs", e) }
          },

          async init() {
            this.$watch('customBgUrl', val => localStorage.setItem('sb_bg', val));
            this.$watch('isDarkMode', val => localStorage.setItem('sb_darkmode', val));
            
            // STRICT ENGINE TOGGLE: Change triggers reload & wipe
            this.$watch('proxyEngine', async (val) => {
                localStorage.setItem('sb_proxy', val);
                alert(`Switching to ${val.toUpperCase()}. Sea Bean is cleaning old service workers and restarting.`);
                window.location.reload();
            });
            this.$watch('wispServer', val => {
                localStorage.setItem('sb_wisp', val);
                if (window.bareMuxConnection) window.bareMuxConnection.setTransport("/libcurl/index.mjs", [{ websocket: val }]);
            });

            // --- ISOLATED ENGINE INITIALIZATION ---
            if (this.proxyEngine === 'uv') {
                await this.clearOtherSWs('/uv/');
                if ("serviceWorker" in navigator) {
                    navigator.serviceWorker.register("/uv/sw.js", { scope: __uv$config.prefix }).catch(e => console.warn(e));
                }
                window.bareMuxConnection = new BareMux.BareMuxConnection("/baremux/worker.js");
                window.bareMuxConnection.setTransport("/libcurl/index.mjs", [{ websocket: this.wispServer }]);
                this.addTab();
                setInterval(() => this.syncNativeProxyState(), 500);
                this.ready = true;

            } else if (this.proxyEngine === 'scramjet') {
                await this.clearOtherSWs('/sail/');
                if ("serviceWorker" in navigator) {
                    navigator.serviceWorker.register("/sail/sw.js").catch(e => console.warn(e));
                }
                window.bareMuxConnection = new BareMux.BareMuxConnection("/sail/baremux/worker.js");
                window.bareMuxConnection.setTransport("/sail/libcurl/index.mjs", [{ websocket: this.wispServer }]);
                
                if (window.$scramjetLoadController) {
                    const { ScramjetController } = $scramjetLoadController();
                    window.scramjetObj = new ScramjetController({
                        files: { all: "/sail/scram/scramjet.all.js", wasm: "/sail/scram/scramjet.wasm.wasm", sync: "/sail/scram/scramjet.sync.js" },
                        prefix: "/sail/go/"
                    });
                    window.scramjetObj.init();
                }
                this.addTab();
                setInterval(() => this.syncNativeProxyState(), 500);
                this.ready = true;

            } else if (this.proxyEngine === 'shader') {
                await this.clearOtherSWs('/shader-prevent-conflict');
                try {
                    const [canvasModule, clientModule] = await Promise.all([ import('./shader-canvas.js'), import('./shader-client.js') ]);
                    this.canvas = new canvasModule.ShaderCanvas('canvas-container');
                    
                    this.canvas.on(canvasModule.ShaderCanvas.EVENTS.SURFACE_CHANGE, (s) => {
                        this.activeTabId = s ? s.id : null;
                        if (s && s.client) {
                            try {
                                const url = s.client.decode(s.client._lastUrl || '');
                                this.currentUrlInput = url === 'about:blank' ? '' : url; 
                            } catch (err) {}
                        }
                    });
                    this.canvas.on(canvasModule.ShaderCanvas.EVENTS.URL_CHANGE, () => this.refreshShaderTabs());
                    this.canvas.on(canvasModule.ShaderCanvas.EVENTS.TITLE_CHANGE, () => this.refreshShaderTabs());
                    this.canvas.on(canvasModule.ShaderCanvas.EVENTS.READY, () => { this.ready = true });
                    this.addTab();
                } catch(e) { console.error("Shader load fail", e) }
            }

            this.setupZoomListeners();
          },

          // --- UNIFIED TAB MANAGEMENT ---
          addTab() { 
            if (this.proxyEngine === 'shader') {
                const id = this.canvas.createSurface(); 
                this.canvas.switchSurface(id); 
                this.refreshShaderTabs();
            } else {
                const id = Date.now();
                this.tabs.push({ id, title: 'New Tab', url: '', iframeSrc: '', favicon: 'mathpunch.jpeg' });
                this.activeTabId = id;
                this.currentUrlInput = '';
            }
          },

          closeTab(id) { 
            if (this.proxyEngine === 'shader') {
                this.canvas.closeSurface(id);
                this.refreshShaderTabs();
            } else {
                const index = this.tabs.findIndex(t => t.id === id);
                this.tabs = this.tabs.filter(t => t.id !== id);
                if (this.tabs.length === 0) this.addTab();
                else if (this.activeTabId === id) this.activeTabId = (this.tabs[index] || this.tabs[index - 1]).id;
            }
          },

          activateTab(id) {
            if (this.proxyEngine === 'shader') {
                this.canvas.switchSurface(id);
            } else {
                this.activeTabId = id;
                const tab = this.tabs.find(t => t.id === id);
                this.currentUrlInput = tab ? tab.url : '';
            }
          },

          refreshShaderTabs() {
            this.tabs = Array.from(this.canvas.surfaces.values()).map((s) => {
              let url = '';
              if (s.client) try { url = s.client.decode(s.client._lastUrl || ''); } catch (err) {}
              return { id: s.id, title: s.title, favicon: s.favicon, url: url };
            });
          },

          // --- UNIFIED NAVIGATION ---
          navigate(url) {
            this.zoomLevel = 1.0;
            let targetUrl = url.trim();
            if (!targetUrl.includes(".") && !targetUrl.startsWith("http")) targetUrl = "https://search.brave.com/search?q=" + encodeURIComponent(targetUrl);
            else if (!targetUrl.startsWith("http")) targetUrl = "https://" + targetUrl;

            if (this.proxyEngine === 'shader') {
                this.canvas.navigate(targetUrl);
            } else if (this.proxyEngine === 'uv' && window.__uv$config) {
                const activeTab = this.tabs.find(t => t.id === this.activeTabId);
                if (activeTab) {
                    activeTab.url = targetUrl;
                    activeTab.iframeSrc = __uv$config.prefix + __uv$config.encodeUrl(targetUrl);
                    this.currentUrlInput = targetUrl;
                }
            } else if (this.proxyEngine === 'scramjet' && window.scramjetObj) {
                const activeTab = this.tabs.find(t => t.id === this.activeTabId);
                if (activeTab) {
                    activeTab.url = targetUrl;
                    activeTab.iframeSrc = window.scramjetObj.encodeUrl(targetUrl);
                    this.currentUrlInput = targetUrl;
                }
            }
            this.closeDropdowns();
          },

          // --- NATIVE IFRAME SYNC (UV/SCRAMJET) ---
          getActiveIframe() { return document.getElementById('iframe-' + this.activeTabId); },

          syncNativeProxyState() {
              if (this.proxyEngine === 'shader') return;
              const frame = this.getActiveIframe();
              if (frame && frame.contentWindow) {
                  try {
                      const loc = frame.contentWindow.location.href;
                      let decoded = null;

                      if (this.proxyEngine === 'uv' && window.__uv$config && loc.includes(__uv$config.prefix)) {
                          decoded = __uv$config.decodeUrl(loc.substring(loc.indexOf(__uv$config.prefix) + __uv$config.prefix.length));
                      } else if (this.proxyEngine === 'scramjet' && window.scramjetObj && loc.includes('/sail/go/')) {
                          decoded = window.scramjetObj.decodeUrl(loc.substring(loc.indexOf('/sail/go/')));
                      }

                      if (decoded && decoded !== this.currentUrlInput && !this.urlBarFocused) {
                          this.currentUrlInput = decoded;
                          const tab = this.tabs.find(t => t.id === this.activeTabId);
                          if (tab) tab.url = decoded;
                      }
                      
                      if (frame.contentDocument && frame.contentDocument.title) {
                          const tab = this.tabs.find(t => t.id === this.activeTabId);
                          if (tab && tab.title !== frame.contentDocument.title) tab.title = frame.contentDocument.title;
                      }
                  } catch(e) {}
              }
          },

          // --- BROWSER CONTROLS ---
          reloadTab() { 
              if (this.proxyEngine === 'shader') this.canvas.reload();
              else { const f = this.getActiveIframe(); if(f) try { f.contentWindow.location.reload() } catch(e) { f.src=f.src } }
          },
          goBack() { 
              if (this.proxyEngine === 'shader') this.canvas.goBack();
              else { const f = this.getActiveIframe(); if(f) try { f.contentWindow.history.back() } catch(e) {} }
          },
          goForward() { 
              if (this.proxyEngine === 'shader') this.canvas.goForward();
              else { const f = this.getActiveIframe(); if(f) try { f.contentWindow.history.forward() } catch(e) {} }
          },
          
          setupZoomListeners() {
            window.addEventListener('keydown', (e) => {
              if (e.ctrlKey || e.metaKey) {
                if (e.key === '=' || e.key === '+') { e.preventDefault(); this.zoomIn(); } 
                else if (e.key === '-') { e.preventDefault(); this.zoomOut(); } 
                else if (e.key === '0') { e.preventDefault(); this.resetZoom(); }
              }
            });
            window.addEventListener('wheel', (e) => {
              if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                if (e.deltaY < 0) this.zoomIn(0.05);
                else this.zoomOut(0.05);
              }
            }, { passive: false });
          },
          zoomIn(s = 0.1) { this.zoomLevel = Math.min(this.zoomLevel + s, 5.0); this.zoomLevel = Math.round(this.zoomLevel * 100) / 100; },
          zoomOut(s = 0.1) { this.zoomLevel = Math.max(this.zoomLevel - s, 0.01); this.zoomLevel = Math.round(this.zoomLevel * 100) / 100; },
          resetZoom() { this.zoomLevel = 1.0; },

          fetchSuggestions(query, type) {
            this.sugIndex = -1;
            if (!query.trim()) { this.suggestions = []; this.showUrlSuggestions = false; this.showHomeSuggestions = false; return; }
            const script = document.createElement('script');
            const callbackName = 'gsCb_' + Math.round(100000 * Math.random());
            window[callbackName] = (data) => {
              this.suggestions = data[1].slice(0, 8); 
              if (type === 'url') this.showUrlSuggestions = true;
              if (type === 'home') this.showHomeSuggestions = true;
              delete window[callbackName]; script.remove();
            };
            script.src = `https://suggestqueries.google.com/complete/search?client=chrome&q=${encodeURIComponent(query)}&callback=${callbackName}`;
            document.head.appendChild(script);
          },

          navSuggestion(dir, type) {
            if (!this.suggestions.length) return;
            this.sugIndex += dir;
            if (this.sugIndex >= this.suggestions.length) this.sugIndex = 0;
            if (this.sugIndex < 0) this.sugIndex = this.suggestions.length - 1;
            const selected = this.suggestions[this.sugIndex];
            if (type === 'url') this.currentUrlInput = selected;
            if (type === 'home') this.homeSearchInput = selected;
          },

          selectSuggestion(sug) { this.navigate(sug); },
          submitUrlForm() { this.navigate(this.sugIndex >= 0 && this.suggestions.length ? this.suggestions[this.sugIndex] : this.currentUrlInput); },
          submitHomeForm() {
             this.navigate(this.sugIndex >= 0 && this.suggestions.length ? this.suggestions[this.sugIndex] : this.homeSearchInput);
             this.homeSearchInput = '';
          },

          handleFileUpload(event) {
              const file = event.target.files[0]; if (!file) return;
              const reader = new FileReader();
              reader.onload = (e) => { this.customBgUrl = e.target.result; };
              reader.readAsDataURL(file);
          },

          toggleMenu(menu) {
              const current = this.menus[menu];
              Object.keys(this.menus).forEach(k => this.menus[k] = false); 
              this.menus[menu] = !current;
          },
          closeDropdowns() {
            this.urlBarFocused = false; this.homeFocused = false; this.showUrlSuggestions = false; this.showHomeSuggestions = false; this.sugIndex = -1;
            Object.keys(this.menus).forEach(k => this.menus[k] = false);
          }
        }
      }
    </script>
  </body>
</html>
