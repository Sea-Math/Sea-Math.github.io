<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sea Bean</title>
    <link rel="icon" type="image/jpeg" href="mathpunch.jpeg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <script src="/sail/baremux/index.js"></script>
    <script src="/sail/scram/scramjet.all.js"></script>
    <script>
        navigator.serviceWorker.register("/sail/sw.js").catch(err => console.warn("SW config:", err));
    </script>

    <script src="https://unpkg.com/alpinejs" defer></script>
    
    <style>
        /* Matte Black Theme Variables */
        :root {
            --bg-base: #0f111a;
            --bg-panel: #1a1d27;
            --bg-element: #232838;
            --bg-element-hover: #2d3447;
            --accent-blue: #3b82f6;
            --accent-blue-dim: rgba(59, 130, 246, 0.15);
            --text-primary: #e2e8f0;
            --text-muted: #64748b;
            --border-color: #2a3149;
            --radius-lg: 16px;
            --radius-md: 8px;
            --radius-sm: 6px;
        }

        * {
            margin: 0;
            padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 12px;
            gap: 12px;
        }

        /* --- Header / Tabs --- */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 4px;
        }

        .tabs-container {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab {
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
            max-width: 200px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .tab:hover {
            background: var(--bg-element-hover);
        }
        .tab.active {
            background: var(--accent-blue-dim);
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }
        .tab-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tab-close {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            border-radius: 4px;
            padding: 2px 4px;
        }
        .tab-close:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.1);
        }

        .icon-btn {
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: var(--radius-md);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .icon-btn:hover {
            background: var(--bg-element-hover);
            color: var(--text-primary);
        }
        .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }

        /* --- Toolbar --- */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 4px;
        }

        .url-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0 16px;
            height: 38px;
            transition: border-color 0.2s;
        }
        .url-bar:focus-within {
            border-color: var(--accent-blue);
        }
        .url-bar svg {
            width: 16px;
            height: 16px; fill: var(--text-muted); margin-right: 12px;
        }
        .url-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        /* --- Bookmarks Bar --- */
        .bookmark-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 4px 8px;
            overflow-x: auto;
        }
        .bookmark-bar::-webkit-scrollbar { display: none; }
        .bookmark-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            user-select: none;
        }
        .bookmark-item:hover {
            color: var(--text-primary);
        }
        .bookmark-item img {
            width: 14px;
            height: 14px; border-radius: 2px;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
            display: flex;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.2);
        }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* --- New Tab Clock UI --- */
        .new-tab-ui {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e2436 0%, var(--bg-panel) 70%);
            z-index: 10;
        }
        .clock-container {
            display: flex;
            align-items: baseline;
            user-select: none;
        }
        .clock-time {
            font-size: 8rem;
            font-weight: 500;
            color: #94a3b8;
            letter-spacing: -2px;
        }

        /* --- Settings Modal --- */
        .modal-overlay {
            position: fixed;
            inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md); width: 400px; padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .form-group select, .form-group input[type="text"] {
            width: 100%;
            padding: 10px; background: var(--bg-element); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); color: var(--text-primary); outline: none; font-size: 14px;
        }
        .form-group select:focus, .form-group input[type="text"]:focus { border-color: var(--accent-blue); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
        cursor: pointer; border: none; }
        .btn-cancel { background: transparent; color: var(--text-muted);
        border: 1px solid var(--border-color); }
        .btn-cancel:hover { background: var(--bg-element); color: var(--text-primary); }
        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-primary:hover { filter: brightness(1.1); }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px !important;
            color: var(--text-primary) !important;
            cursor: pointer;
        }
        .checkbox-label input { width: 16px; height: 16px; cursor: pointer; }
    </style>
</head>

<body x-data="browserApp()">

    <div class="header">
        <div class="tabs-container">
            <template x-for="tab in tabs" :key="tab.id">
                <div class="tab" :class="{ 'active': activeTabId === tab.id }" @click="activateTab(tab.id)">
                    <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    <span class="tab-title" x-text="tab.title || 'New Tab'"></span>
                    <span class="tab-close" @click.stop="closeTab(tab.id)">×</span>
                </div>
            </template>
        </div>
        <button class="icon-btn" @click="addTab()" title="New Tab">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
    </div>

    <div class="toolbar">
        <button class="icon-btn" @click="goBack()" title="Back">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path></svg>
        </button>
        <button class="icon-btn" @click="goForward()" title="Forward">
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"></path></svg>
        </button>
        <button class="icon-btn" @click="reloadTab()" title="Reload">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.24 4.94 14.24 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"></path></svg>
        </button>
        
        <div class="url-bar">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
            <form @submit.prevent="submitUrl()" style="flex:1; display:flex;">
                <input type="text" x-model="urlInput" placeholder="Search or enter URL" @focus="$event.target.select()" />
            </form>
        </div>

        <button class="icon-btn" @click="sharePage()" title="Share">
            <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
        </button>
        <button class="icon-btn" @click="showSettings = true" title="Settings">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
        <button class="icon-btn" @click="bookmarkCurrent()" title="Bookmark">
             <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
        </button>
    </div>

    <div class="bookmark-bar">
        <template x-for="bm in bookmarks" :key="bm.id">
            <div class="bookmark-item" @click="navigate(bm.url)" :title="bm.url">
                <img :src="bm.icon || `https://www.google.com/s2/favicons?domain=${bm.url}&sz=32`" onerror="this.onerror=null;this.src='mathpunch.jpeg'">
                <span x-text="bm.name"></span>
            </div>
        </template>
    </div>

    <div class="main-content">
        <div class="new-tab-ui" x-show="showNewTabUI">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div class="clock-container">
                    <span class="clock-time">sea bean</span>
                </div>
            </div>
        </div>

        <template x-for="tab in tabs" :key="tab.id">
            <iframe 
                class="browser-frame" 
                x-show="tab.id === activeTabId && tab.url !== ''" 
                :src="tab.proxyUrl" 
                @load="handleIframeLoad(tab.id, $event)">
            </iframe>
        </template>
    </div>
    
    <div class="modal-overlay" x-show="showSettings" style="display: none;" @click="showSettings = false">
        <div class="modal" @click.stop>
            <h2>Browser Settings</h2>
            
            <div class="form-group">
                <label>Scramjet Wisp Server</label>
                <select x-model="scramjetServer">
                    <option value="wss://wisp.rhw.one/">Splash (Default)</option>
                    <option value="wss://portable.splash.best/wisp/">Portable Splash Wisp</option>
                    <option value="wss://technonyte-loves-x8r.installgentoo.com/wisp/">FortiGuard / Lightspeed Bypass</option>
                    <option value="wss://v5-soon-plz-2764827364186354128.govt.hu/wisp/">Palo Alto / Blocksi Bypass</option>
                    <option value="wss://wedvbmath.help/wisp/">Terbium Wisp</option>
                </select>
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" x-model="adBlockEnabled">
                    Enable Ad & Popup Blocker
                </label>
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-cancel" @click="showSettings = false">Cancel</button>
                <button class="btn btn-primary" @click="applySettings()">Apply & Reload</button>
            </div>
        </div>
    </div>

    <script>
        function browserApp() {
            return {
                tabs: [],
                activeTabId: null,
                urlInput: '',
                showSettings: false,
                
                // Load saved preferences
                scramjetServer: localStorage.getItem('sb_scramjet_server') || 'wss://wisp.rhw.one/',
                adBlockEnabled: localStorage.getItem('sb_adblock') === 'true',
                
                // Persistent Bookmarks
                bookmarks: [
                    { id: 1, name: 'GitHub', url: 'https://github.com' },
                    { id: 2, name: 'Discord', url: 'https://discord.com/app' },
                    { id: 3, name: 'YouTube', url: 'https://youtube.com' }
                ],

                get activeTab() { return this.tabs.find(t => t.id === this.activeTabId); },
                get showNewTabUI() { return !this.activeTab || this.activeTab.url === ''; },

                init() {
                    this.addTab(); 
                    this.initProxy();
                },

                initProxy() {
                    try {
                        if (window.BareMux) {
                            window.bareMuxConnection = new BareMux.BareMuxConnection("/sail/baremux/worker.js");
                            window.bareMuxConnection.setTransport("/sail/libcurl/index.mjs", [{ websocket: this.scramjetServer }]);
                            
                            if (typeof $scramjetLoadController !== 'undefined') {
                                const { ScramjetController } = $scramjetLoadController();
                                window.scramjetObj = new ScramjetController({
                                    files: {
                                        all: "/sail/scram/scramjet.all.js",
                                        wasm: "/sail/scram/scramjet.wasm.wasm",
                                        sync: "/sail/scram/scramjet.sync.js"
                                    },
                                    prefix: "/sail/go/" 
                                });
                                window.scramjetObj.init();
                            }
                        }
                    } catch(e) {
                        console.warn("Proxy Core initialized error:", e);
                    }
                },

                applySettings() {
                    // Save to local storage
                    localStorage.setItem('sb_scramjet_server', this.scramjetServer);
                    localStorage.setItem('sb_adblock', this.adBlockEnabled);
                    
                    // Set transport immediately just in case
                    if (window.bareMuxConnection) {
                        window.bareMuxConnection.setTransport("/sail/libcurl/index.mjs", [{ websocket: this.scramjetServer }]);
                    }
                    
                    this.showSettings = false;
                    
                    // Force a reload so the Service Worker fully resets with the new Wisp WebSocket
                    window.location.reload();
                },

                addTab() {
                    const id = Date.now();
                    this.tabs.push({
                        id: id,
                        title: 'New Tab',
                        url: '',
                        proxyUrl: ''
                    });
                    this.activateTab(id);
                },

                closeTab(id) {
                    const index = this.tabs.findIndex(t => t.id === id);
                    this.tabs = this.tabs.filter(t => t.id !== id);
                    
                    if (this.tabs.length === 0) {
                        this.addTab();
                    } else if (this.activeTabId === id) {
                        const nextTab = this.tabs[index] || this.tabs[index - 1];
                        if (nextTab) this.activateTab(nextTab.id);
                    }
                },

                activateTab(id) {
                    this.activeTabId = id;
                    const tab = this.activeTab;
                    if (tab) {
                        this.urlInput = tab.url;
                    }
                },

                submitUrl() {
                    if (this.urlInput) {
                        this.navigate(this.urlInput);
                    }
                },

                navigate(url) {
                    let targetUrl = url.trim();
                    if (!targetUrl.includes(".") && !targetUrl.startsWith("http")) {
                        targetUrl = "https://search.brave.com/search?q=" + encodeURIComponent(targetUrl);
                    } else if (!targetUrl.startsWith("http")) {
                        targetUrl = "https://" + targetUrl;
                    }

                    const tab = this.activeTab;
                    if (tab) {
                        tab.url = targetUrl;
                        this.urlInput = targetUrl;
                        
                        // Scramjet encoding
                        if (window.scramjetObj) {
                            tab.proxyUrl = window.scramjetObj.encodeUrl(targetUrl);
                        } else {
                            tab.proxyUrl = "/sail/go/" + btoa(targetUrl);
                        }
                    }
                },

                handleIframeLoad(tabId, event) {
                    const iframe = event.target;
                    
                    // 1. Sync the Title
                    try {
                        const doc = iframe.contentDocument || iframe.contentWindow.document;
                        const tab = this.tabs.find(t => t.id === tabId);
                        if (tab && doc.title) {
                            tab.title = doc.title;
                        }
                    } catch(e) {} // Ignore cross-origin issues
                    
                    // 2. Inject Ad & Popup Blocker
                    if (this.adBlockEnabled) {
                        try {
                            const win = iframe.contentWindow;
                            const doc = win.document;
                            
                            // Block window.open popups
                            win.open = function() {
                                console.log("Sea Bean Blocked a Popup");
                                return null;
                            };

                            // Inject CSS to hide common ad frames/classes
                            const style = doc.createElement('style');
                            style.textContent = `
                                iframe[src*="doubleclick"], 
                                iframe[src*="ads"], 
                                [id*="google_ads"], 
                                [class*="ad-container"], 
                                .ad, .ads, .ad-banner {
                                    display: none !important;
                                    pointer-events: none !important;
                                    height: 0 !important;
                                    width: 0 !important;
                                }
                            `;
                            doc.head.appendChild(style);
                        } catch (err) {
                            // If cross-origin restrictions apply, we can't inject.
                            // Scramjet normally proxies everything as same-origin, so this should usually work.
                        }
                    }
                },

                getActiveIframe() {
                    const iframes = document.querySelectorAll('.browser-frame');
                    for (let f of iframes) {
                        if (f.style.display !== 'none') return f;
                    }
                    return null;
                },

                goBack() {
                    const frame = this.getActiveIframe();
                    if (frame && frame.contentWindow) { try { frame.contentWindow.history.back(); } catch(e){} }
                },

                goForward() {
                    const frame = this.getActiveIframe();
                    if (frame && frame.contentWindow) { try { frame.contentWindow.history.forward(); } catch(e){} }
                },

                reloadTab() {
                    const frame = this.getActiveIframe();
                    if (frame) {
                        try { frame.contentWindow.location.reload(); } catch(e) { frame.src = frame.src; }
                    }
                },

                sharePage() {
                    if (this.urlInput) {
                        navigator.clipboard.writeText(this.urlInput);
                        alert("URL copied to clipboard!");
                    }
                },

                bookmarkCurrent() {
                    if (this.urlInput && this.urlInput !== '') {
                        const exists = this.bookmarks.find(b => b.url === this.urlInput);
                        if (!exists) {
                            this.bookmarks.push({
                                id: Date.now(),
                                name: this.activeTab.title || 'Saved Page',
                                url: this.urlInput
                            });
                        } else {
                            this.bookmarks = this.bookmarks.filter(b => b.url !== this.urlInput);
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
