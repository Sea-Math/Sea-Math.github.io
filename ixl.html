<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Ultraviolet Proxy for Next Dev</title>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script src="/baremux/index.js"></script>
    
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        
        body {
            margin: 0;
            overflow: hidden; /* Prevents scrollbars from the iframe bleeding */
            background-color: #121212; /* Dark fallback behind the iframe */
        }

        /* Fullscreen Iframe */
        #iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: -1;
        }

        /* Floating Glassmorphism Search Bar */
        #form {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 8px;
            background: rgba(20, 20, 25, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 10;
        }

        /* Glow effect when typing */
        #form:focus-within {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* Input Styling */
        #urlbar {
            background: transparent;
            border: none;
            color: white;
            width: 350px;
            padding: 10px 16px;
            font-size: 16px;
            outline: none;
        }

        #urlbar::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Button Styling */
        #submit {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 0 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #submit:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #submit:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <form action="" id="form">
        <input type="text" id="urlbar" placeholder="Search Brave or enter a URL..." autocomplete="off">
        <button id="submit" type="submit">Go</button>
    </form>

    <iframe src="" id="iframe"></iframe>

    <script>
        // Register Service Worker
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js").catch(err => console.error("SW Registration failed:", err));
            });
        }
    </script>

    <script>
        // UV & BareMux Handling
        const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
        const wispUrl = "wss://webmath.help/wisp/";
        const bareUrl = "https://useclassplay.vercel.app/fq/";

        const urlBar = document.getElementById("urlbar");
        const submitBtn = document.getElementById("submit");
        const iframe = document.getElementById("iframe");

        // Handle Enter key
        urlBar.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                submitBtn.click();
            }
        });

        // Handle Submit
        submitBtn.onclick = async function (e) {
            e.preventDefault();

            let url = urlBar.value.trim();
            let searchUrl = "https://search.brave.com/search?q=";

            // Basic URL vs Search detection (added space check)
            if (!url.includes(".") || url.includes(" ")) {
                url = searchUrl + encodeURIComponent(url);
            } else {
                if (!url.startsWith("http://") && !url.startsWith("https://")) {
                    url = "https://" + url;
                }
            }

            // Transport setup
            if (!await connection.getTransport()) {
                await connection.setTransport("/libcurl/index.mjs", [{ websocket: wispUrl }]);
            }

            // Load URL into iframe
            iframe.src = __uv$config.prefix + __uv$config.encodeUrl(url);

            // Update URL bar when iframe loads
            iframe.onload = () => {
                urlBar.value = iframe.src;
            };
        };
    </script>
</body>
</html>
