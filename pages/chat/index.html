
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarkChat - Enterprise Edition</title>
  <script src="https://unpkg.com/lucide@latest"></script>

 <link rel="stylesheet" href="css/chat.css"/>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <h2>DarkChat Systems</h2>
      <input type="text" id="login-user" class="input-dark" placeholder="Username (3-20 chars)">
      <input type="password" id="login-pass" class="input-dark" placeholder="Password">
      <label style="font-size: 13px; color: var(--text-muted);">Profile Picture:</label>
      <input type="file" id="login-icon" class="input-dark" accept="image/*" style="padding: 8px;">
      <button id="btn-enter" class="btn-white">Initialize Secure Connection</button>
    </div>
  </div>

  <div id="search-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title" style="margin:0; font-size:18px;">Find User / Create Group</h2>
        <i data-lucide="x" style="cursor:pointer; color:var(--text-muted);" id="close-search-btn"></i>
      </div>
      <div style="margin-bottom: 16px;" id="group-name-container">
        <label style="font-size:12px; color:var(--text-muted);">Group Name (Optional for DMs):</label>
        <input type="text" id="new-group-name" class="input-dark" placeholder="e.g. Project Alpha">
      </div>
      <input type="text" id="user-search-input" class="input-dark" placeholder="Search for users...">
      <div class="search-results" id="search-results-list"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-search-btn">Cancel</button>
        <button class="btn-white" id="create-invite-btn" style="display:none; background: var(--accent-blue); color: white;" data-mode="new">Send Group Invites</button>
      </div>
    </div>
  </div>

  <div class="app-layout">
    <nav class="sidebar-left">
      <div class="sidebar-header">
        <h1 style="margin:0; font-size:20px;">Chats</h1>
        <button class="icon-btn" id="open-search-btn" title="Search / New Chat"><i data-lucide="search" size="16"></i></button>
      </div>
      <div id="invites-section" style="display: none;">
        <div class="category-label" style="color: var(--accent-blue);">Pending Invites</div>
        <div id="invites-list"></div>
      </div>
      <div class="category-label">Public</div>
      <div id="channel-list-public">
        <div class="channel-item active" data-room="global">
          <div class="channel-icon"><i data-lucide="globe" size="14"></i></div>
          <span>Global Chat</span>
        </div>
      </div>
      <div class="category-label" style="margin-top: 24px;">Direct Messages & Groups</div>
      <div id="channel-list-dms"></div>
    </nav>

    <main class="main-chat">
      <header class="chat-header">
        <h2 class="chat-title" id="current-room-title">Global Chat</h2>
        <div class="header-actions">
          <i data-lucide="user-plus" class="action-icon" id="add-to-group-btn" title="Add People to Group" style="display: none;"></i>
          
          <div class="connection-pill" id="status-pill"><span class="dot"></span> <span id="online-count">0</span> connected</div>
          <i data-lucide="users" class="action-icon" id="toggle-users-btn"></i>
        </div>
      </header>
      <div class="messages-container" id="msg-container"></div>
      <div class="input-container">
        <div class="input-box">
          <input type="file" id="image-upload" accept="image/*" style="display:none;">
          <i data-lucide="paperclip" class="action-icon" id="attach-btn" title="Attach Image"></i>
          <input type="text" placeholder="Type a message... (Use @Name to mention)" id="msg-input">
          <button class="send-btn" id="send-btn"><i data-lucide="send" stroke-width="2.5"></i></button>
        </div>
      </div>
    </main>

    <aside class="sidebar-right hidden" id="right-sidebar">
      <div class="right-header">
        <span>Network — Online</span>
        <i data-lucide="layout-panel-right" size="14" style="cursor:pointer;" id="close-right-sidebar"></i>
      </div>
      <div id="online-users-list"></div>
    </aside>
  </div>
<script src="js/chat.js"></script>
</body>
</html>
